# ===================================================================
# Python FastAPI CI/CD 배포
# ===================================================================
#
# deploy 브랜치 푸시 시 backend/ 변경 감지 후 Docker 이미지를 빌드하고 배포합니다.
#
# ===================================================================
# 🔑 필수 GitHub Secrets
# ===================================================================
# BACKEND_ENV_FILE: backend/.env 파일 내용
# DOCKERHUB_USERNAME: DockerHub 사용자명
# DOCKERHUB_TOKEN: DockerHub 액세스 토큰
# SERVER_HOST: 배포 서버 주소
# SERVER_USER: SSH 사용자명
# SERVER_PASSWORD: SSH 비밀번호
# PROJECT_BACKEND_PORT (선택): 백엔드 포트 (기본: 8000)
# ===================================================================

name: PROJECT-PYTHON-CICD

on:
  push:
    branches:
      - deploy
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  PROJECT_NAME: "pickerpicker"
  DOCKER_IMAGE_PREFIX: "back-container"

jobs:
  build:
    name: Python FastAPI 애플리케이션 빌드
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      # 2. 환경변수 파일 생성
      - name: 환경변수 파일 생성 (backend/.env)
        run: |
          cat << 'EOF' > ./backend/.env
          ${{ secrets.BACKEND_ENV_FILE }}
          EOF
          echo "✅ backend/.env 파일 생성 완료"

      # 3. Docker 빌드 환경 설정
      - name: Docker 빌드환경 설정
        uses: docker/setup-buildx-action@v3

      # 4. DockerHub 로그인
      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Docker 레이어 캐싱
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-backend-${{ hashFiles('backend/Dockerfile') }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-backend-

      # 6. Docker 이미지 빌드 및 푸시
      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PROJECT_NAME }}-${{ env.DOCKER_IMAGE_PREFIX }}:${{ github.ref_name }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # 7. Docker 캐시 정리
      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    name: 원격 서버 배포
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 2022
          script: |
            set -e

            echo "🔧 환경변수 설정.."
            export PATH=$PATH:/usr/local/bin
            export PW=${{ secrets.SERVER_PASSWORD }}

            BRANCH=${{ github.ref_name }}
            PROJECT_NAME="${{ env.PROJECT_NAME }}"

            PORT=8000
            CONTAINER_NAME="${PROJECT_NAME}-back"

            if [ "$BRANCH" == "deploy" ] || [ "$BRANCH" == "main" ]; then
              PORT=${{ secrets.PROJECT_BACKEND_PORT || '8000' }}
              CONTAINER_NAME="${PROJECT_NAME}-back-deploy"
              echo "🚀 배포 환경으로 배포합니다 (브랜치: $BRANCH)"
            else
              echo "⚠️ 지원하지 않는 브랜치입니다: $BRANCH"
              exit 1
            fi

            echo "📋 배포 설정 정보:"
            echo "  - 브랜치: $BRANCH"
            echo "  - 컨테이너: $CONTAINER_NAME"
            echo "  - 포트: $PORT"

            # Docker 이미지 풀
            echo "⬇️ Docker 이미지 풀 중..."
            echo $PW | sudo -S docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${PROJECT_NAME}-${{ env.DOCKER_IMAGE_PREFIX }}:${BRANCH}

            # 기존 컨테이너 정리
            if sudo docker ps -a --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
              echo "⚠️ 기존 컨테이너 $CONTAINER_NAME 삭제 중..."
              echo $PW | sudo -S docker rm -f $CONTAINER_NAME
            fi

            # 새 컨테이너 실행
            echo "🚀 새로운 컨테이너 $CONTAINER_NAME 실행 중..."
            echo $PW | sudo -S docker run -d \
              -p ${PORT}:8000 \
              --name $CONTAINER_NAME \
              -e TZ=Asia/Seoul \
              -v /etc/localtime:/etc/localtime:ro \
              ${{ secrets.DOCKERHUB_USERNAME }}/${PROJECT_NAME}-${{ env.DOCKER_IMAGE_PREFIX }}:${BRANCH}

            echo "✅ 백엔드 배포 완료!"
            echo ""
            echo "📋 배포 결과:"
            echo "  🎯 프로젝트: $PROJECT_NAME"
            echo "  🌿 브랜치: $BRANCH"
            echo "  🐳 컨테이너: $CONTAINER_NAME"
            echo "  🌐 포트: $PORT"
            echo "  ⏰ 배포 시간: $(date '+%Y-%m-%d %H:%M:%S')"
            echo ""
            echo "🔗 헬스체크: http://${{ secrets.SERVER_HOST }}:${PORT}/health"

# ===================================================================
# 추가 필요한 Secrets
# ===================================================================
# BACKEND_ENV_FILE: DATABASE_URL, ENVIRONMENT 등 포함한 .env 내용
# PROJECT_BACKEND_PORT: 기본 8000 (선택)
# ===================================================================
