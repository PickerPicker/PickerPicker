# ===================================================================
# Deploy 트리거 — main → deploy PR 자동 생성
# ===================================================================
# workflow_dispatch로 수동 실행 시 main → deploy PR을 생성하고
# 릴리스 노트 초안을 자동으로 작성합니다.
#
# PROJECT-REACT-CICD.yaml이 deploy 브랜치 push 시 빌드/배포를 처리합니다.
# ===================================================================

name: PROJECT-DEPLOY-TRIGGER

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Deploy PR 제목 (비우면 날짜 자동 생성)'
        required: false
        default: ''

jobs:
  create-deploy-pr:
    name: main → deploy PR 생성
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: deploy PR 생성 및 릴리스 노트 작성
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const today = new Date().toISOString().slice(0,10).replace(/-/g,'')
            const title = context.payload.inputs?.title?.trim()
              || `🚀 Deploy ${today}`

            // 기존 open deploy PR 확인
            const { data: openPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'deploy',
            })

            let prNumber
            if (openPRs.length > 0) {
              prNumber = openPRs[0].number
              console.log(`기존 deploy PR #${prNumber} 재사용`)
            } else {
              try {
                const { data: pr } = await github.rest.pulls.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  head: 'main',
                  base: 'deploy',
                  body: '',
                })
                prNumber = pr.number
                console.log(`새 deploy PR #${prNumber} 생성`)
              } catch (e) {
                console.error('PR 생성 실패:', e.message)
                throw e
              }
            }

            // 릴리스 노트 작성
            const body = `<!-- This is an auto-generated comment: release notes by coderabbit.ai -->

            ## Summary by CodeRabbit

            ## 릴리스 노트

            * **새 기능**
              * 키보드 매핑 랜덤 셔플 — 스테이지마다 키 배치가 달라져 난이도 증가
              * 노트가 판정선을 지나 왼쪽 화면 밖으로 사라지도록 개선
              * 노트 크기 3배 확대로 가시성 향상

            * **개선**
              * 게임 화면 전반 폰트/UI 요소 크기 확대 (갈무리9 픽셀 폰트)

            <!-- end of auto-generated comment: release notes by coderabbit.ai -->`

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body,
            })

            console.log(`✅ PR #${prNumber} 릴리스 노트 업데이트 완료`)
            console.log(`URL: https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${prNumber}`)
